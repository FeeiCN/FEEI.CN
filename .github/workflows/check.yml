name: Strict site check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict build check
        run: DOCUSAURUS_FASTER=true CI_STRICT=true npm run build
