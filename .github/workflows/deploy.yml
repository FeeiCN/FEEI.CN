name: Deploy website

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REPO_DIR: /data/wufeifei.com
  SITE_ROOT: /data/wufeifei.com-site

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "REPO_DIR='${{ env.REPO_DIR }}' SITE_ROOT='${{ env.SITE_ROOT }}' bash -se" <<'EOF'
          set -euo pipefail

          timer_start=0
          start_timer() {
            timer_start="$(date +%s)"
          }
          format_duration() {
            local total="$1"
            local minutes=$((total / 60))
            local seconds=$((total % 60))

            if [ "$minutes" -gt 0 ]; then
              echo "${minutes}分${seconds}秒"
            else
              echo "${seconds}秒"
            fi
          }
          end_timer() {
            local name="$1"
            local timer_end
            local duration
            timer_end="$(date +%s)"
            duration=$((timer_end - timer_start))
            echo "[deploy-timing] ${name}: $(format_duration "$duration")"
          }
          group_start() {
            echo "::group::$1"
            start_timer
          }
          group_end() {
            end_timer "$1"
            echo "::endgroup::"
          }

          repo_dir="$REPO_DIR"
          site_root="$SITE_ROOT"
          releases_dir="$site_root/releases"
          current_link="$site_root/current"
          next_current_link="$site_root/current.next"
          releases_to_keep=5

          group_start "Prepare repository"
          cd "$repo_dir"
          old_head="$(git rev-parse HEAD)"
          git pull origin main
          new_head="$(git rev-parse HEAD)"
          echo "old_head=$old_head"
          echo "new_head=$new_head"
          group_end "Prepare repository"

          group_start "Install dependencies if needed"
          if ! git diff --quiet "$old_head" "$new_head" -- package.json package-lock.json; then
            echo "package.json or package-lock.json changed. Running npm ci."
            npm ci
          else
            echo "Dependencies unchanged. Skipping npm ci."
          fi
          group_end "Install dependencies if needed"

          group_start "Prepare release directories"
          release_name="$(git rev-parse HEAD)"
          release_dir="$releases_dir/$release_name"
          staging_dir="${release_dir}.tmp"
          mkdir -p "$releases_dir"
          rm -rf "$staging_dir"
          echo "release_dir=$release_dir"
          echo "staging_dir=$staging_dir"
          group_end "Prepare release directories"

          group_start "Build Docusaurus"
          npm run build -- --out-dir "$staging_dir"
          group_end "Build Docusaurus"

          group_start "Publish release"
          rm -rf "$release_dir"
          mv "$staging_dir" "$release_dir"
          ln -sfn "$release_dir" "$next_current_link"
          mv -Tf "$next_current_link" "$current_link"
          group_end "Publish release"

          group_start "Clean old releases"
          ls -1dt "$releases_dir"/* 2>/dev/null | tail -n +$((releases_to_keep + 1)) | xargs -r rm -rf
          group_end "Clean old releases"
          EOF